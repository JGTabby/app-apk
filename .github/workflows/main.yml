name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 將 checkout 更新到 v4
      - name: Checkout the code
        uses: actions/checkout@v4

      # 將 setup-java 更新到 v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd ClipBatteryLink
          gradle assembleDebug

      # 解決報錯的關鍵：將 upload-artifact 更新到 v4
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ClipBatteryLink/app/build/outputs/apk/debug/app-debug.apk
